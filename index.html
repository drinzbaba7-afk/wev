<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR1NZY_DRIVE | Alpha Console</title>
    <style>
        :root {
            --bg: #030303;
            --panel: #0d0d0d;
            --accent: #ffcc00;
            --sub-accent: #00e1ff;
            --terminal-green: #00ff41;
            --alert-red: #ff3c3c;
            --text-main: #d1d1d1;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .top-nav {
            background: #000;
            border-bottom: 2px solid var(--accent);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .wrapper { max-width: 1400px; margin: 30px auto; padding: 0 20px; }

        .brand-logo {
            font-size: 3.5rem; font-weight: 900; color: var(--accent);
            margin-bottom: 5px; letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .console-box {
            background: var(--panel); padding: 25px;
            border: 1px solid var(--border); margin-bottom: 20px;
            position: relative;
        }

        .console-box::before {
            content: "[ TACTICAL_DECK ]"; position: absolute;
            top: -10px; left: 20px; background: var(--bg);
            color: var(--sub-accent); padding: 0 10px; font-size: 0.8rem;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 18px; }

        input {
            flex-grow: 1; background: #000; border: 1px solid #444;
            color: var(--accent); padding: 18px; font-size: 1.2rem; outline: none;
        }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

        button {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 12px 22px; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; transition: 0.2s;
        }

        button:hover { background: #222; }
        .primary:hover { background: var(--accent); color: #000; }
        .alert:hover { background: var(--alert-red); color: #000; }

        .display-grid {
            display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px;
        }

        #terminal {
            background: #000; border: 1px solid var(--border);
            padding: 20px; height: 550px; overflow-y: auto;
            color: var(--terminal-green); white-space: pre-wrap;
            font-size: 0.9rem; box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .side-panel {
            background: var(--panel); border: 1px solid var(--border);
            height: 175px; position: relative; overflow: hidden; margin-bottom: 10px;
        }

        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(1); }
        .status-msg { color: #444; position: absolute; top: 10px; left: 10px; font-size: 0.7rem; text-transform: uppercase;}
        
        canvas { width: 100%; height: 100%; }

        .data-stream {
            padding: 30px 10px 10px 10px;
            font-size: 0.7rem;
            color: var(--sub-accent);
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>ZETA_STATUS: <span style="color:var(--terminal-green)">[ SYNCHRONIZED ]</span></div>
        <div>OPERATOR: <span style="color:var(--accent)">ALPHA</span></div>
        <div id="user-meta">LINK: INITIALIZING_</div>
    </div>

    <div class="wrapper">
        <div class="brand-logo">DR1NZY_DRIVE v3.4</div>
        
        <div class="console-box">
            <div class="input-group">
                <input type="text" id="target" placeholder="TARGET_IDENTIFIER (IP/DOMAIN)">
            </div>
            <div class="btn-row">
                <button class="primary" onclick="executeFullScan()">Full Intel Scan</button>
                <button onclick="scanPorts()">Port Scanner</button>
                <button onclick="dnsRecon()">DNS Recon</button>
                <button onclick="httpHeaders()">HTTP Headers</button>
                <button onclick="clearTerminal()">Clear</button>
                <button class="alert" onclick="selfDestruct()">Self Destruct</button>
            </div>
        </div>

        <div class="display-grid">
            <div id="terminal">> Awaiting instructions, Alpha...</div>
            <div>
                <div class="side-panel" id="stability-graph">
                    <div class="status-msg" id="ping-text">GATEWAY_STABILITY: 100%</div>
                    <canvas id="graphCanvas"></canvas>
                </div>
                <div class="side-panel" id="map-container">
                    <div class="status-msg">GEOLOCATION_MAP</div>
                    <div style="margin-top:40%; text-align:center; color:#333;">[ OFFLINE ]</div>
                </div>
                <div class="side-panel" id="traffic-monitor">
                    <div class="status-msg">LIVE_TRAFFIC_MONITOR</div>
                    <div class="data-stream" id="stream-output">Initializing packet capture...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => document.getElementById('user-meta').innerText = `NODE_LINK: ${d.ip}`);

        const term = document.getElementById('terminal');
        const mapBox = document.getElementById('map-container');
        const streamOut = document.getElementById('stream-output');

        function addLog(text, color = 'var(--terminal-green)') {
            const span = document.createElement('span');
            span.style.color = color;
            span.innerHTML = `\n${text}`;
            term.appendChild(span);
            term.scrollTop = term.scrollHeight;
        }

        async function executeFullScan() {
            const target = document.getElementById('target').value;
            if(!target) return addLog("> ERROR: Target Identifier Null.", 'var(--alert-red)');
            
            addLog(`> INITIATING DEEP RECONNAISSANCE ON ${target}...`, 'var(--accent)');
            
            try {
                const res = await fetch(`https://ipapi.co/${target}/json/`);
                const data = await res.json();
                
                let report = `\n> Intel Recovered for ${target}:\n`;
                report += `------------------------------------\n`;
                report += `CITY/COUNTRY: ${data.city || 'N/A'}, ${data.country_name || 'N/A'}\n`;
                report += `ISP/ORG:      ${data.org || 'N/A'}\n`;
                report += `COORDS:       ${data.latitude}, ${data.longitude}\n`;
                report += `ASN/VER:      ${data.asn || 'N/A'} / ${data.version || 'N/A'}\n`;
                report += `------------------------------------`;
                
                addLog(report);
                mapBox.innerHTML = `<div class="status-msg">GEOLOCATION_MAP</div><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${data.longitude-0.1},${data.latitude-0.1},${data.longitude+0.1},${data.latitude+0.1}&layer=mapnik&marker=${data.latitude},${data.longitude}"></iframe>`;
            } catch (e) {
                addLog("> ERROR: Connection to datastream severed.", 'var(--alert-red)');
            }
        }

        function scanPorts() {
            const target = document.getElementById('target').value || "127.0.0.1";
            addLog(`> Starting Port Audit on ${target}...`, 'var(--sub-accent)');
            const ports = [21, 22, 53, 80, 443, 3306];
            ports.forEach((p, i) => {
                setTimeout(() => {
                    const open = Math.random() > 0.6;
                    addLog(`> Port ${p}: ${open ? 'OPEN' : 'CLOSED'}`, open ? 'var(--terminal-green)' : 'var(--border)');
                }, i * 150);
            });
        }

        function dnsRecon() {
            const target = document.getElementById('target').value || "Zeta_Node";
            addLog(`> Querying DNS records for ${target}...`, 'var(--sub-accent)');
            setTimeout(() => {
                addLog(`> [A] ${target} -> 192.168.${Math.floor(Math.random()*254)}.${Math.floor(Math.random()*254)}`);
                addLog(`> [MX] mail.${target} -> priority 10`);
                addLog(`> [TXT] "v=spf1 include:_spf.google.com ~all"`);
                addLog(`> DNS Reconnaissance complete.`);
            }, 800);
        }

        function httpHeaders() {
            const target = document.getElementById('target').value || "Zeta_Node";
            addLog(`> Fetching HTTP Headers for ${target}...`, 'var(--sub-accent)');
            setTimeout(() => {
                addLog(`> HTTP/1.1 200 OK\n> Server: nginx/Zeta-v4\n> Content-Type: text/html\n> X-Frame-Options: SAMEORIGIN\n> Connection: keep-alive`);
            }, 600);
        }

        function clearTerminal() {
            term.innerHTML = "> Console Purged. Ready for command, Alpha.";
            mapBox.innerHTML = '<div class="status-msg">GEOLOCATION_MAP</div><div style="margin-top:40%; text-align:center; color:#333;">[ OFFLINE ]</div>';
        }

        function selfDestruct() {
            addLog("> !!! INITIATING SYSTEM WIPE !!!", 'var(--alert-red)');
            setTimeout(() => {
                document.body.innerHTML = "<div style='color:red; font-family:monospace; text-align:center; margin-top:20%; font-size:2rem;'>[ SYSTEM TERMINATED ]</div>";
            }, 1500);
        }

        // --- Traffic Monitor Logic ---
        function updateTraffic() {
            const packets = ["GET /index.php", "POST /api/login", "TCP ACK 443", "UDP DNS QUERY", "SSL HANDSHAKE", "TLSv1.3 ENCRYPTED"];
            const p = packets[Math.floor(Math.random() * packets.length)];
            streamOut.innerHTML = `> ${p}<br>` + streamOut.innerHTML.split('<br>').slice(0, 8).join('<br>');
            setTimeout(updateTraffic, Math.random() * 2000 + 500);
        }
        updateTraffic();

        // --- Stability Graph Logic ---
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let points = Array(50).fill(50);

        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 1;
            ctx.beginPath();
            points.push(Math.random() * 60 + 20);
            points.shift();
            for(let i = 0; i < points.length; i++) {
                const x = (canvas.width / points.length) * i;
                const y = points[i];
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            document.getElementById('ping-text').innerText = `GATEWAY_STABILITY: ${Math.floor(Math.random()*5 + 95)}%`;
            requestAnimationFrame(drawGraph);
        }
        drawGraph();
    </script>
</body>
</html>
