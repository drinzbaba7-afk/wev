            --accent: #ff0000; /* Alert Red */
            --text-main: #fff;
            --text-dim: #777;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;

            background-position: center;

        .master-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .volume-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            color: #444;
            cursor: pointer;
        }

        .view-counter {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 400px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .target-id {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .target-id::before { content: '{'; color: var(--text-dim); }
        .target-id::after { content: '}'; color: var(--text-dim); }

        .target-bio {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .location-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 30px;
        }

        .status-block {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .status-block span { color: var(--text-main); text-transform: none; }

        .discord-link {
            font-size: 1.5rem;
            color: #fff;
            opacity: 0.4;
            transition: 0.2s;
            text-decoration: none;
