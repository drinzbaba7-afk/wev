<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR1NZY_DRIVE | Alpha Console</title>
    <style>
        :root {
            --bg: #030303;
            --panel: #0d0d0d;
            --accent: #ffcc00;
            --sub-accent: #00e1ff;
            --terminal-green: #00ff41;
            --alert-red: #ff3c3c;
            --text-main: #d1d1d1;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .top-nav {
            background: #000;
            border-bottom: 2px solid var(--accent);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .wrapper { max-width: 1400px; margin: 30px auto; padding: 0 20px; }

        .brand-logo {
            font-size: 3.5rem; font-weight: 900; color: var(--accent);
            margin-bottom: 5px; letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .console-box {
            background: var(--panel); padding: 25px;
            border: 1px solid var(--border); margin-bottom: 20px;
            position: relative;
        }

        .console-box::before {
            content: "[ COMMAND_DECK ]"; position: absolute;
            top: -10px; left: 20px; background: var(--bg);
            color: var(--sub-accent); padding: 0 10px; font-size: 0.8rem;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 18px; }

        input {
            flex-grow: 1; background: #000; border: 1px solid #444;
            color: var(--accent); padding: 18px; font-size: 1.2rem; outline: none;
        }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

        button {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 12px 22px; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; transition: 0.2s;
        }

        button:hover { background: #222; }
        .primary:hover { background: var(--accent); color: #000; }
        .alert:hover { background: var(--alert-red); color: #000; }

        .display-grid {
            display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px;
        }

        #terminal {
            background: #000; border: 1px solid var(--border);
            padding: 20px; height: 550px; overflow-y: auto;
            color: var(--terminal-green); white-space: pre-wrap;
            font-size: 0.9rem; box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.1);
        }

        #map-container, #port-scanner, #stability-graph {
            background: var(--panel); border: 1px solid var(--border);
            height: 220px; position: relative; overflow: hidden; margin-bottom: 15px;
        }

        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(1); }
        .status-msg { color: #444; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.7rem;}
        
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>ZETA_PROTOCOL: <span style="color:var(--terminal-green)">[ DOMINANT ]</span></div>
        <div>OPERATOR: <span style="color:var(--accent)">ALPHA</span></div>
        <div id="user-meta">LINK: INITIALIZING_</div>
    </div>

    <div class="wrapper">
        <div class="brand-logo">DR1NZY_DRIVE v3.3</div>
        
        <div class="console-box">
            <div class="input-group">
                <input type="text" id="target" placeholder="TARGET_IDENTIFIER (IP/DOMAIN)">
            </div>
            <div class="btn-row">
                <button class="primary" onclick="executeFullScan()">Full Intel Scan</button>
                <button onclick="scanPorts()">Port Scanner</button>
                <button onclick="runSimulation('brute')">Brute Sim</button>
                <button onclick="runSimulation('decrypt')">Quantum Decrypt</button>
                <button onclick="clearTerminal()">Clear</button>
                <button class="alert" onclick="selfDestruct()">Self Destruct</button>
            </div>
        </div>

        <div class="display-grid">
            <div id="terminal">> Standby for commands, Alpha...</div>
            <div>
                <div id="stability-graph">
                    <div class="status-msg" id="ping-text">STABILITY: 100% | 14ms</div>
                    <canvas id="graphCanvas"></canvas>
                </div>
                <div id="map-container"><div class="status-msg">[ MAP_OFFLINE ]</div></div>
                <div id="port-scanner"><div class="status-msg">[ SCANNER_READY ]</div></div>
            </div>
        </div>
    </div>

    <script>
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => document.getElementById('user-meta').innerText = `NODE_LINK: ${d.ip}`);

        const term = document.getElementById('terminal');
        const mapBox = document.getElementById('map-container');
        const scannerBox = document.getElementById('port-scanner');

        function addLog(text, color = 'var(--terminal-green)') {
            const span = document.createElement('span');
            span.style.color = color;
            span.innerHTML = `\n${text}`;
            term.appendChild(span);
            term.scrollTop = term.scrollHeight;
        }

        async function executeFullScan() {
            const target = document.getElementById('target').value;
            if(!target) return addLog("> ERROR: Target Identifier Null.", 'var(--alert-red)');
            
            addLog(`> INITIATING DEEP RECONNAISSANCE ON ${target}...`, 'var(--accent)');
            
            try {
                const res = await fetch(`https://ipapi.co/${target}/json/`);
                const data = await res.json();
                
                let report = `\n> Intel Recovered for ${target}:\n`;
                report += `------------------------------------\n`;
                report += `CITY:      ${data.city || 'N/A'}\n`;
                report += `COUNTRY:   ${data.country_name || 'N/A'}\n`;
                report += `ISP:       ${data.org || 'N/A'}\n`;
                report += `COORDS:    ${data.latitude}, ${data.longitude}\n`;
                report += `ASN:       ${data.asn || 'N/A'}\n`;
                report += `------------------------------------`;
                
                addLog(report);
                mapBox.innerHTML = `<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${data.longitude-0.1},${data.latitude-0.1},${data.longitude+0.1},${data.latitude+0.1}&layer=mapnik&marker=${data.latitude},${data.longitude}"></iframe>`;
            } catch (e) {
                addLog("> ERROR: Connection to datastream severed.", 'var(--alert-red)');
            }
        }

        function scanPorts() {
            const target = document.getElementById('target').value || "127.0.0.1";
            addLog(`> Starting Port Audit on ${target}...`, 'var(--sub-accent)');
            scannerBox.innerHTML = `<div style="padding:15px; color:var(--accent); font-size:0.75rem;">[ AUDITING ${target} ]<br><br>`;
            
            const ports = [21, 22, 23, 80, 443, 8080];
            ports.forEach((p, i) => {
                setTimeout(() => {
                    const open = Math.random() > 0.5;
                    const status = open ? '<span style="color:var(--terminal-green)">OPEN</span>' : '<span style="color:#444">CLOSED</span>';
                    scannerBox.firstChild.innerHTML += `PORT ${p}: ${status}<br>`;
                    if(open) addLog(`> VULNERABILITY DETECTED: Port ${p} is OPEN.`);
                    if(i === ports.length - 1) addLog(`> Port Audit for ${target} complete.`);
                }, i * 150);
            });
        }

        function runSimulation(type) {
            const target = document.getElementById('target').value || "ZETA_NODE_01";
            addLog(`> Executing ${type.toUpperCase()} sequence against ${target}...`, 'var(--alert-red)');
            let count = 0;
            const interval = setInterval(() => {
                addLog(`> [${type.toUpperCase()}] Attempting bypass... Key: ${Math.random().toString(36).substring(7)}`, 'var(--text-main)');
                count++;
                if(count > 8) {
                    clearInterval(interval);
                    addLog(`> [SUCCESS] ${type.toUpperCase()} finalized. Access granted to ${target}.`, 'var(--accent)');
                }
            }, 200);
        }

        function clearTerminal() {
            term.innerHTML = "> Console Purged. Ready for command, Alpha.";
            mapBox.innerHTML = '<div class="status-msg">[ MAP_OFFLINE ]</div>';
            scannerBox.innerHTML = '<div class="status-msg">[ SCANNER_READY ]</div>';
        }

        function selfDestruct() {
            addLog("> !!! INITIATING SYSTEM WIPE !!!", 'var(--alert-red)');
            setTimeout(() => {
                document.body.innerHTML = "<div style='color:red; font-family:monospace; text-align:center; margin-top:20%;'>[ SYSTEM TERMINATED ]<br>CONNECTION TO ZETA LOST.</div>";
            }, 1500);
        }

        // --- Stability Graph Logic ---
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let points = Array(50).fill(50);

        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#00e1ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            points.push(Math.random() * 40 + 30);
            points.shift();
            
            for(let i = 0; i < points.length; i++) {
                const x = (canvas.width / points.length) * i;
                const y = points[i];
                if(i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            document.getElementById('ping-text').innerText = `STABILITY: ${Math.floor(Math.random()*5 + 95)}% | ${Math.floor(Math.random()*10 + 12)}ms`;
            requestAnimationFrame(drawGraph);
        }
        drawGraph();
    </script>
</body>
</html>
