<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR1NZY_DRIVE | Alpha Console</title>
    <style>
        :root {
            --bg: #030303;
            --panel: #0d0d0d;
            --accent: #ffcc00;
            --sub-accent: #00e1ff;
            --terminal-green: #00ff41;
            --alert-red: #ff3c3c;
            --text-main: #d1d1d1;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .top-nav {
            background: #000;
            border-bottom: 2px solid var(--accent);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .wrapper { max-width: 1400px; margin: 30px auto; padding: 0 20px; }

        .brand-logo {
            font-size: 3.5rem; font-weight: 900; color: var(--accent);
            margin-bottom: 5px; letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .console-box {
            background: var(--panel); padding: 25px;
            border: 1px solid var(--border); margin-bottom: 20px;
            position: relative;
        }

        .console-box::before {
            content: "[ INFRASTRUCTURE_DECK ]"; position: absolute;
            top: -10px; left: 20px; background: var(--bg);
            color: var(--sub-accent); padding: 0 10px; font-size: 0.8rem;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 18px; }

        input {
            flex-grow: 1; background: #000; border: 1px solid #444;
            color: var(--accent); padding: 18px; font-size: 1.2rem; outline: none;
        }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

        button {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 12px 22px; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; transition: 0.2s;
        }

        button:hover { background: #222; }
        .primary:hover { background: var(--accent); color: #000; }
        .alert:hover { background: var(--alert-red); color: #000; }

        .display-grid {
            display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px;
        }

        #terminal {
            background: #000; border: 1px solid var(--border);
            padding: 20px; height: 600px; overflow-y: auto;
            color: var(--terminal-green); white-space: pre-wrap;
            font-size: 0.9rem; box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .side-panel {
            background: var(--panel); border: 1px solid var(--border);
            height: 190px; position: relative; overflow: hidden; margin-bottom: 15px;
        }

        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(1); }
        .status-msg { color: #444; position: absolute; top: 10px; left: 10px; font-size: 0.7rem; text-transform: uppercase; z-index: 2;}
        
        canvas { width: 100%; height: 100%; }

        .data-stream {
            padding: 35px 10px 10px 10px;
            font-size: 0.7rem;
            color: var(--sub-accent);
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>ZETA_STATUS: <span style="color:var(--terminal-green)">[ INFRA_MAPPED ]</span></div>
        <div>OPERATOR: <span style="color:var(--accent)">ALPHA</span></div>
        <div id="user-meta">LINK: INITIALIZING_</div>
    </div>

    <div class="wrapper">
        <div class="brand-logo">DR1NZY_DRIVE v3.5</div>
        
        <div class="console-box">
            <div class="input-group">
                <input type="text" id="target" placeholder="TARGET_IDENTIFIER (IP/DOMAIN/ORG)">
            </div>
            <div class="btn-row">
                <button class="primary" onclick="executeFullScan()">Full Intel Scan</button>
                <button onclick="orgSearch()">Org Search</button>
                <button onclick="whoisHistory()">Whois History</button>
                <button onclick="scanPorts()">Port Scanner</button>
                <button onclick="clearTerminal()">Clear</button>
                <button class="alert" onclick="selfDestruct()">Self Destruct</button>
            </div>
        </div>

        <div class="display-grid">
            <div id="terminal">> Infrastructure link established. Standby, Alpha...</div>
            <div>
                <div class="side-panel" id="stability-graph">
                    <div class="status-msg" id="ping-text">GATEWAY_STABILITY: 100%</div>
                    <canvas id="graphCanvas"></canvas>
                </div>
                <div class="side-panel" id="map-container">
                    <div class="status-msg">GEOLOCATION_MAP</div>
                    <div style="margin-top:40%; text-align:center; color:#333;">[ OFFLINE ]</div>
                </div>
                <div class="side-panel" id="traffic-monitor">
                    <div class="status-msg">LIVE_NODE_TRAFFIC</div>
                    <div class="data-stream" id="stream-output">Syncing with Zeta-Net...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => document.getElementById('user-meta').innerText = `NODE_LINK: ${d.ip}`);

        const term = document.getElementById('terminal');
        const mapBox = document.getElementById('map-container');
        const streamOut = document.getElementById('stream-output');

        function addLog(text, color = 'var(--terminal-green)') {
            const span = document.createElement('span');
            span.style.color = color;
            span.innerHTML = `\n${text}`;
            term.appendChild(span);
            term.scrollTop = term.scrollHeight;
        }

        async function executeFullScan() {
            const target = document.getElementById('target').value;
            if(!target) return addLog("> ERROR: Target Null.", 'var(--alert-red)');
            addLog(`> INITIATING DEEP RECON ON ${target}...`, 'var(--accent)');
            try {
                const res = await fetch(`https://ipapi.co/${target}/json/`);
                const data = await res.json();
                let report = `\n> Intel: ${target}\n------------------------------------\nLOC: ${data.city}, ${data.country_name}\nISP: ${data.org}\nASN: ${data.asn}\n------------------------------------`;
                addLog(report);
                mapBox.innerHTML = `<div class="status-msg">GEOLOCATION_MAP</div><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${data.longitude-0.1},${data.latitude-0.1},${data.longitude+0.1},${data.latitude+0.1}&layer=mapnik&marker=${data.latitude},${data.longitude}"></iframe>`;
            } catch (e) { addLog("> ERROR: Datastream Severed.", 'var(--alert-red)'); }
        }

        function orgSearch() {
            const target = document.getElementById('target').value || "Unknown_Org";
            addLog(`> Querying ISP infrastructure for: ${target}...`, 'var(--sub-accent)');
            setTimeout(() => {
                addLog(`> [CIDR] 192.168.0.0/24 detected.`);
                addLog(`> [NODES] 254 potential endpoints mapped.`);
                addLog(`> [GATEWAY] zeta-gw-prod-01.local`);
                addLog(`> Organization mapping complete.`);
            }, 900);
        }

        function whoisHistory() {
            const target = document.getElementById('target').value || "Zeta_Target";
            addLog(`> Retrieving WHOIS ownership history for ${target}...`, 'var(--sub-accent)');
            setTimeout(() => {
                addLog(`> [2024-03-20]: Registration updated (Alpha-Corp).`);
                addLog(`> [2022-11-15]: Nameserver shift to ZETA-DNS-01.`);
                addLog(`> [2019-06-01]: Initial record created.`);
                addLog(`> Historical audit finalized.`);
            }, 700);
        }

        function scanPorts() {
            const target = document.getElementById('target').value || "127.0.0.1";
            addLog(`> Port Audit: ${target}...`, 'var(--sub-accent)');
            [80, 443, 22].forEach((p, i) => {
                setTimeout(() => {
                    const open = Math.random() > 0.5;
                    addLog(`> Port ${p}: ${open ? 'OPEN' : 'CLOSED'}`, open ? 'var(--terminal-green)' : 'var(--border)');
                }, i * 200);
            });
        }

        function clearTerminal() {
            term.innerHTML = "> Console Purged. Ready, Alpha.";
            mapBox.innerHTML = '<div class="status-msg">GEOLOCATION_MAP</div><div style="margin-top:40%; text-align:center; color:#333;">[ OFFLINE ]</div>';
        }

        function selfDestruct() {
            addLog("> !!! SYSTEM WIPE !!!", 'var(--alert-red)');
            setTimeout(() => { document.body.innerHTML = "<div style='color:red; font-family:monospace; text-align:center; margin-top:20%; font-size:2rem;'>[ DISCONNECTED ]</div>"; }, 1000);
        }

        function updateTraffic() {
            const p = ["HANDSHAKE: Node-A -> Node-Z", "PACKET: Encrypted (AES-256)", "QUERY: DB_RECON_SYNC", "STATUS: 200 OK (Zeta-Gateway)"][Math.floor(Math.random()*4)];
            streamOut.innerHTML = `> ${p}<br>` + streamOut.innerHTML.split('<br>').slice(0, 6).join('<br>');
            setTimeout(updateTraffic, 1500);
        }
        updateTraffic();

        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let points = Array(50).fill(50);
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 1;
            ctx.beginPath();
            points.push(Math.random() * 40 + 20); points.shift();
            for(let i = 0; i < points.length; i++) {
                const x = (canvas.width / points.length) * i;
                const y = points[i];
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            document.getElementById('ping-text').innerText = `GATEWAY_STABILITY: ${Math.floor(Math.random()*5 + 95)}%`;
            requestAnimationFrame(drawGraph);
        }
        drawGraph();
    </script>
</body>
</html>
