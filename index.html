<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta IP Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e;
            color: #e94560;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 2px solid #e94560;
            border-radius: 15px;
            background: #16213e;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        h1 { margin-bottom: 1rem; }
        #ip-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0f3460;
            background: #ffffff;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>System IP Identification 📡</h1>
        <p>Current Network Address:</p>
        <div id="ip-display">Loading...</div>
    </div>

    <script>
        // Fetching the IP from a public API
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('ip-display').textContent = data.ip;
            } catch (error) {
                document.getElementById('ip-display').textContent = "Error retrieving IP";
                console.error("Failed to fetch IP:", error);
            }
        }

        getIP();
    </script>
</body>
</html>
