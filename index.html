<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR1NZY_DRIVE | Alpha Console</title>
    <style>
        :root {
            --bg: #030303;
            --panel: #0d0d0d;
            --accent: #ffcc00;
            --sub-accent: #00e1ff;
            --terminal-green: #00ff41;
            --alert-red: #ff3c3c;
            --text-main: #d1d1d1;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .top-nav {
            background: #000;
            border-bottom: 2px solid var(--accent);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .wrapper { max-width: 1400px; margin: 30px auto; padding: 0 20px; }

        .brand-logo {
            font-size: 3.5rem; font-weight: 900; color: var(--accent);
            margin-bottom: 5px; letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .console-box {
            background: var(--panel); padding: 25px;
            border: 1px solid var(--border); margin-bottom: 20px;
            position: relative;
        }

        .console-box::before {
            content: "[ COMMAND_DECK ]"; position: absolute;
            top: -10px; left: 20px; background: var(--bg);
            color: var(--sub-accent); padding: 0 10px; font-size: 0.8rem;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 18px; }

        input {
            flex-grow: 1; background: #000; border: 1px solid #444;
            color: var(--accent); padding: 18px; font-size: 1.2rem; outline: none;
        }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

        button {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 12px 22px; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; transition: 0.2s;
        }

        button:hover { background: #222; }
        .primary:hover { background: var(--accent); color: #000; }
        .alert:hover { background: var(--alert-red); color: #000; }

        .display-grid {
            display: grid; grid-template-columns: 2fr 1.5fr; gap: 20px;
        }

        #terminal {
            background: #000; border: 1px solid var(--border);
            padding: 20px; height: 500px; overflow-y: auto;
            color: var(--terminal-green); white-space: pre-wrap;
            font-size: 0.9rem; box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.1);
        }

        #map-container, #port-scanner {
            background: var(--panel); border: 1px solid var(--border);
            height: 240px; position: relative; overflow: hidden; margin-bottom: 20px;
        }

        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(1); }
        .status-msg { color: #444; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>ZETA_PROTOCOL: <span style="color:var(--terminal-green)">[ ONLINE ]</span></div>
        <div>OPERATOR: <span style="color:var(--accent)">ALPHA</span></div>
        <div id="user-meta">LINK: INITIALIZING_</div>
    </div>

    <div class="wrapper">
        <div class="brand-logo">DR1NZY_DRIVE v3.2</div>
        
        <div class="console-box">
            <div class="input-group">
                <input type="text" id="target" placeholder="TARGET_IDENTIFIER (IP/DOMAIN)">
            </div>
            <div class="btn-row">
                <button class="primary" onclick="executeFullScan()">Full Intel Scan</button>
                <button onclick="scanPorts()">Port Scanner</button>
                <button onclick="runModule('WHOIS')">Whois Data</button>
                <button onclick="runSimulation('brute')">Brute Sim</button>
                <button onclick="runSimulation('decrypt')">Quantum Decrypt</button>
                <button class="alert" onclick="selfDestruct()">Self Destruct</button>
            </div>
        </div>

        <div class="display-grid">
            <div id="terminal">> Awaiting instructions, Alpha...</div>
            <div>
                <div id="map-container"><div class="status-msg">[ MAP_OFFLINE ]</div></div>
                <div id="port-scanner"><div class="status-msg">[ SCANNER_READY ]</div></div>
            </div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1481017632588173384/rhiNFMhz1p7l4SALoBvCyxEa4vJal2sEumK_gRvhOGgHo9xhkX87veJ5imMdSQ_3ah97";

        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => document.getElementById('user-meta').innerText = `NODE_LINK: ${d.ip}`);

        const term = document.getElementById('terminal');
        const mapBox = document.getElementById('map-container');
        const scannerBox = document.getElementById('port-scanner');

        async function sendToDiscord(title, content, color = 16763904) {
            const payload = {
                embeds: [{
                    title: `📡 DR1NZY_INTEL: ${title}`,
                    description: `\`\`\`${content}\`\`\``,
                    color: color,
                    footer: { text: "ZETA_DRIVE | AUTH: ALPHA" }
                }]
            };
            await fetch(DISCORD_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }

        async function executeFullScan() {
            const target = document.getElementById('target').value;
            if(!target) return addLog("> ERROR: Target Null.");
            addLog(`> Initiating deep recon on ${target}...`);
            try {
                const res = await fetch(`https://ipapi.co/${target}/json//`);
                const data = await res.json();
                let report = `IP: ${data.ip}\nLOC: ${data.city}, ${data.country_name}\nISP: ${data.org}\nASN: ${data.asn}`;
                addLog(`> SCAN COMPLETE.\n${report}`);
                sendToDiscord("INTEL_RECON", report, 16763904);
                mapBox.innerHTML = `<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${data.longitude-0.1},${data.latitude-0.1},${data.longitude+0.1},${data.latitude+0.1}&layer=mapnik&marker=${data.latitude},${data.longitude}"></iframe>`;
            } catch (e) { addLog("> ERROR: Timeout."); }
        }

        function scanPorts() {
            const target = document.getElementById('target').value || "127.0.0.1";
            addLog(`> Port scan started on ${target}...`);
            let results = `Target: ${target}\n`;
            const ports = [22, 80, 443, 3306];
            ports.forEach((p, i) => {
                setTimeout(() => {
                    const status = Math.random() > 0.5 ? 'OPEN' : 'CLOSED';
                    results += `PORT ${p}: ${status}\n`;
                    if(i === ports.length - 1) {
                        sendToDiscord("PORT_AUDIT", results, 3066993);
                        addLog("> Port audit broadcasted.");
                    }
                }, i * 200);
            });
        }

        function runSimulation(type) {
            const target = document.getElementById('target').value || "Zeta_Node";
            addLog(`> Executing ${type} sim...`);
            setTimeout(() => {
                const res = `SIM: ${type.toUpperCase()}\nTARGET: ${target}\nKEY: ${Math.random().toString(36).substring(7)}`;
                sendToDiscord("SECURITY_BYPASS", res, 16724787);
                addLog(`> ${type} sim results sent to Discord.`);
            }, 1000);
        }

        function runModule(type) {
            const target = document.getElementById('target').value || "Zeta_Node";
            sendToDiscord("WHOIS_QUERY", `Target: ${target}\nStatus: Record Found.`, 1752220);
            addLog("> Whois data requested.");
        }

        function selfDestruct() {
            addLog("> !!! INITIATING SELF DESTRUCT !!!");
            sendToDiscord("TERMINAL_WIPE", "Session Destroyed by Alpha. Logs Cleared.", 0);
            setTimeout(() => {
                term.innerText = "> SYSTEM PURGED. CONNECTION SEVERED.";
                mapBox.innerHTML = '<div class="status-msg">[ WIPED ]</div>';
                scannerBox.innerHTML = '<div class="status-msg">[ WIPED ]</div>';
                document.body.style.opacity = "0.2";
            }, 1500);
        }

        function addLog(text) { term.innerText += "\n" + text; term.scrollTop = term.scrollHeight; }
    </script>
</body>
</html>
