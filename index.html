            --panel: #0f0f0f;
            --accent: #ffcc00;
            --discord-purple: #5865F2;
            --text: #e0e0e0;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dossier-card {
            background: var(--panel);
            width: 450px;
            border: 1px solid var(--border);
            border-top: 4px solid var(--discord-purple);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .header-banner {
            height: 100px;
            background: linear-gradient(to bottom, var(--discord-purple), transparent);
        }

        .profile-section {
            padding: 0 20px 20px 20px;
            text-align: center;
            margin-top: -50px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid var(--panel);
            background: #222;
            margin-bottom: 10px;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        .handle { color: #888; font-size: 0.9rem; margin-bottom: 20px; }

        .intel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .intel-item {
            font-size: 0.75rem;
            color: #aaa;
            text-align: left;
        }

        .intel-label {
            display: block;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 2px;
        }

        .link-button {
            display: block;
            margin: 20px;
            padding: 12px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            text-align: center;
            border: 1px solid #333;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .link-button:hover {
            background: var(--discord-purple);
            border-color: var(--discord-purple);
        }

        .footer {
            padding: 10px;
            font-size: 0.6rem;
            color: #444;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
